<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile README Preview</title>
<style>
  :root {
    --bg: #ffffff;
    --text: #1f2328;
    --border: #d0d7de;
  }
  [data-theme="dark"] {
    --bg: #0d1117;
    --text: #c9d1d9;
    --border: #30363d;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    display: flex; flex-direction: column; align-items: center;
    padding: 32px 16px 64px;
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }
  .toolbar {
    position: fixed; top: 12px; right: 16px; z-index: 100;
    display: flex; gap: 8px;
  }
  .toolbar button {
    padding: 8px 16px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); cursor: pointer;
    font-size: 13px; font-family: inherit;
    transition: all 0.2s;
  }
  .toolbar button:hover { opacity: 0.8; }
  .toolbar button.active { background: #667eea; color: #fff; border-color: #667eea; }
  .container {
    width: 100%; max-width: 920px;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
  }
  .container img, .container object {
    max-width: 100%; height: auto; display: block;
  }
  .chip-row {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 6px;
  }
  .stats-placeholder {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 24px; text-align: center;
    color: #8b949e; font-size: 14px;
  }
  @media (prefers-color-scheme: dark) {
    body:not([data-theme="light"]) { --bg: #0d1117; --text: #c9d1d9; --border: #30363d; }
  }
</style>
</head>
<body>

<div class="toolbar">
  <button id="btn-light" class="active" onclick="setTheme('light')">☀️ Light</button>
  <button id="btn-dark" onclick="setTheme('dark')">🌙 Dark</button>
</div>

<div class="container" id="content">
  <!-- dynamic fill via JS -->
</div>

<script>
const CHIPS = ['Python','TypeScript','JavaScript','HTML5','Docker','Git','Linux','VSCode','GitHub'];
const LABELS = ['label-2','label-3'];
const ROWS = [
  ['label-2', 'Python', 'TypeScript', 'JavaScript', 'HTML5'],
  ['label-3', 'Docker', 'Git', 'Linux', 'VSCode', 'GitHub'],
];

function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('btn-light').classList.toggle('active', t === 'light');
  document.getElementById('btn-dark').classList.toggle('active', t === 'dark');
  render();
}

function night(name) { return t === 'dark' ? name.replace('.svg','-night.svg') : name; }
function src(name) {
  if (t === 'dark' && (name === 'header' || name === 'footer' || name === 'sky'))
    return name + '-night.svg';
  return name + '.svg';
}

let t = 'light';

function render() {
  t = document.documentElement.getAttribute('data-theme') || 'light';

  const h = src('header');
  const s = src('sky');
  const f = src('footer');

  let html = `
    <object data="${h}" type="image/svg+xml" width="900" style="max-width:100%">header</object>
    <object data="${s}" type="image/svg+xml" width="900" style="max-width:100%">sky</object>
  `;

  for (const row of ROWS) {
    html += '<div class="chip-row">';
    for (const chip of row) {
      const fname = chip.endsWith('label-2') || chip.endsWith('label-3') ? chip : chip;
      html += `<object data="chips/${chip}.svg" type="image/svg+xml" style="height:30px">${chip}</object>`;
    }
    html += '</div>';
  }

  const snakeSrc = t === 'dark'
    ? 'https://raw.githubusercontent.com/rizona27/rizona27/output/snake-dark.svg'
    : 'https://raw.githubusercontent.com/rizona27/rizona27/output/snake.svg';

  html += `
    <img height="170em" src="https://github-readme-streak-stats.herokuapp.com/?user=rizona27&hide_border=true&background=00000000&ring=667eea&fire=a855f7&currStreakLabel=667eea&sideLabels=888888&dates=AAAAAA&currStreakNum=555555&sideNums=555555" alt="streak stats" />
    <br/>
    <img src="${snakeSrc}" alt="contribution snake" style="max-width:100%" />
    <br/>
    <object data="${f}" type="image/svg+xml" width="900" style="max-width:100%">footer</object>
    <div style="margin-top:8px"><img src="https://komarev.com/ghpvc/?username=rizona27&label=Profile%20views&color=F4795B&style=flat" alt="views" /></div>
  `;
  document.getElementById('content').innerHTML = html;
}

render();
</script>
</body>
</html>
