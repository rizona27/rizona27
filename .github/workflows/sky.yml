name: Update Sky & Footer (Weather)

on:
  schedule:
    - cron: "37 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate sky & footer
        run: python3 scripts/gen_scene.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet sky.svg sky-night.svg footer.svg footer-night.svg; then
            git add sky.svg sky-night.svg footer.svg footer-night.svg .github/scene-state
            git commit -m "Update scene: $(cat .github/scene-state)"
            git push
          else
            echo "No weather change"
          fi
