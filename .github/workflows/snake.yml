name: Generate Snake Animation

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/snake.yml"
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Generate the snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg?color_snake=#F4795B&color_dots=#EBEDF0,#FFE0B2,#FFB74D,#FB8C00,#E65100
            dist/snake-dark.svg?color_snake=#F4795B&color_dots=#161B22,#5A3300,#A86A00,#FB8C00,#FFCC80

      - name: Commit snake SVGs
        run: |
          cp dist/snake.svg snake.svg
          cp dist/snake-dark.svg snake-dark.svg
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet snake.svg snake-dark.svg; then
            git add snake.svg snake-dark.svg
            git commit -m "Update snake animation"
            git push
          else
            echo "No changes to snake SVGs"
          fi
