<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 70" width="900" height="70" font-family="Segoe UI, Ubuntu, Helvetica, Arial, sans-serif">
  <title>sky (night)</title>
  <g transform="translate(295,26) scale(0.75)"><path d="M0 -5 L1.2 -1.2 L5 0 L1.2 1.2 L0 5 L-1.2 1.2 L-5 0 L-1.2 -1.2 Z" fill="#D9E6F5" opacity="0.2"><animate attributeName="opacity" values="0.15;0.9;0.15" keyTimes="0;0.5;1" dur="3.7s" begin="2.7s" repeatCount="indefinite"/></path></g><circle cx="220" cy="49" r="0.9" fill="#D9E6F5" opacity="0.2"><animate attributeName="opacity" values="0.1;0.8;0.1" keyTimes="0;0.5;1" dur="2.4s" begin="0.6s" repeatCount="indefinite"/></circle><circle cx="781" cy="19" r="0.9" fill="#D9E6F5" opacity="0.2"><animate attributeName="opacity" values="0.1;0.8;0.1" keyTimes="0;0.5;1" dur="2.2s" begin="2.1s" repeatCount="indefinite"/></circle><g transform="translate(331,9) scale(0.68)"><path d="M0 -5 L1.2 -1.2 L5 0 L1.2 1.2 L0 5 L-1.2 1.2 L-5 0 L-1.2 -1.2 Z" fill="#D9E6F5" opacity="0.2"><animate attributeName="opacity" values="0.15;0.9;0.15" keyTimes="0;0.5;1" dur="3.0s" begin="3.4s" repeatCount="indefinite"/></path></g><circle cx="44" cy="25" r="1.3" fill="#D9E6F5" opacity="0.2"><animate attributeName="opacity" values="0.1;0.8;0.1" keyTimes="0;0.5;1" dur="4.1s" begin="0.3s" repeatCount="indefinite"/></circle><circle cx="855" cy="24" r="1.4" fill="#D9E6F5" opacity="0.2"><animate attributeName="opacity" values="0.1;0.8;0.1" keyTimes="0;0.5;1" dur="4.0s" begin="3.0s" repeatCount="indefinite"/></circle><g transform="translate(842,24) scale(0.77)"><path d="M0 -5 L1.2 -1.2 L5 0 L1.2 1.2 L0 5 L-1.2 1.2 L-5 0 L-1.2 -1.2 Z" fill="#D9E6F5" opacity="0.2"><animate attributeName="opacity" values="0.15;0.9;0.15" keyTimes="0;0.5;1" dur="2.8s" begin="0.9s" repeatCount="indefinite"/></path></g><circle cx="592" cy="44" r="1.3" fill="#D9E6F5" opacity="0.2"><animate attributeName="opacity" values="0.1;0.8;0.1" keyTimes="0;0.5;1" dur="4.4s" begin="2.7s" repeatCount="indefinite"/></circle><circle cx="683" cy="28" r="1.2" fill="#D9E6F5" opacity="0.2"><animate attributeName="opacity" values="0.1;0.8;0.1" keyTimes="0;0.5;1" dur="3.6s" begin="1.4s" repeatCount="indefinite"/></circle><g transform="translate(678,24) scale(0.72)"><path d="M0 -5 L1.2 -1.2 L5 0 L1.2 1.2 L0 5 L-1.2 1.2 L-5 0 L-1.2 -1.2 Z" fill="#D9E6F5" opacity="0.2"><animate attributeName="opacity" values="0.15;0.9;0.15" keyTimes="0;0.5;1" dur="3.7s" begin="2.2s" repeatCount="indefinite"/></path></g>

  <!-- drifting cloud wisps -->
  <g opacity="0.25">
    <g>
      <animateTransform attributeName="transform" type="translate" values="-120 20;980 20" dur="45s" repeatCount="indefinite"/>
      <ellipse cx="0" cy="0" rx="40" ry="6" fill="#FFD0BE" opacity="0.3"/>
      <ellipse cx="20" cy="-4" rx="28" ry="5" fill="#FFD0BE" opacity="0.2"/>
      <ellipse cx="-15" cy="-2" rx="22" ry="4" fill="#FFD0BE" opacity="0.25"/>
    </g>
  </g>
  <g opacity="0.2">
    <g>
      <animateTransform attributeName="transform" type="translate" values="-80 35;980 35" dur="55s" begin="-20s" repeatCount="indefinite"/>
      <ellipse cx="0" cy="0" rx="50" ry="5" fill="#FFD9A8" opacity="0.25"/>
      <ellipse cx="25" cy="-3" rx="32" ry="4.5" fill="#FFD9A8" opacity="0.18"/>
    </g>
  </g>
  <g opacity="0.18">
    <g>
      <animateTransform attributeName="transform" type="translate" values="-60 48;980 48" dur="50s" begin="-35s" repeatCount="indefinite"/>
      <ellipse cx="0" cy="0" rx="35" ry="4" fill="#FFAC90" opacity="0.2"/>
      <ellipse cx="15" cy="-3" rx="24" ry="3.5" fill="#FFAC90" opacity="0.15"/>
    </g>
  </g>

  <!-- sparkle dots: varied rhythm -->
  <g transform="translate(120,35)"><circle r="2" fill="#FFD9A8" opacity="0"><animate attributeName="opacity" values="0;0.6;0" keyTimes="0;0.5;1" dur="4s" begin="1s" repeatCount="indefinite"/></circle></g>
  <g transform="translate(380,22)"><circle r="2.5" fill="#FF9075" opacity="0"><animate attributeName="opacity" values="0;0.55;0" keyTimes="0;0.5;1" dur="5s" begin="2.2s" repeatCount="indefinite"/></circle></g>
  <g transform="translate(640,42)"><circle r="2" fill="#FFD0BE" opacity="0"><animate attributeName="opacity" values="0;0.5;0" keyTimes="0;0.5;1" dur="4.5s" begin="3.1s" repeatCount="indefinite"/></circle></g>
  <g transform="translate(780,28)"><circle r="1.8" fill="#FFA584" opacity="0"><animate attributeName="opacity" values="0;0.45;0" keyTimes="0;0.5;1" dur="3.8s" begin="0.5s" repeatCount="indefinite"/></circle></g>
  <g transform="translate(50,48)"><circle r="1.5" fill="#FF9075" opacity="0"><animate attributeName="opacity" values="0;0.5;0" keyTimes="0;0.5;1" dur="3.5s" begin="2.5s" repeatCount="indefinite"/></circle></g>
  <g transform="translate(500,15)"><circle r="1.8" fill="#FFAC90" opacity="0"><animate attributeName="opacity" values="0;0.4;0" keyTimes="0;0.5;1" dur="4.2s" begin="1.8s" repeatCount="indefinite"/></circle></g>

  <!-- firefly-like drifting particles -->
  <g transform="translate(180,50)"><circle r="1.5" fill="#FFC069" opacity="0"><animate attributeName="opacity" values="0;0.7;0" keyTimes="0;0.5;1" dur="5.5s" begin="0.8s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0 0;-15 -18;-30 -5" keyTimes="0;0.5;1" dur="5.5s" begin="0.8s" repeatCount="indefinite"/></circle></g>
  <g transform="translate(420,55)"><circle r="1.8" fill="#FFC069" opacity="0"><animate attributeName="opacity" values="0;0.6;0" keyTimes="0;0.5;1" dur="6s" begin="2s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0 0;12 -20;-8 -8" keyTimes="0;0.5;1" dur="6s" begin="2s" repeatCount="indefinite"/></circle></g>
  <g transform="translate(700,45)"><circle r="1.3" fill="#FFC069" opacity="0"><animate attributeName="opacity" values="0;0.55;0" keyTimes="0;0.5;1" dur="4.8s" begin="3.5s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0 0;10 -15;-5 -3" keyTimes="0;0.5;1" dur="4.8s" begin="3.5s" repeatCount="indefinite"/></circle></g>

  <!-- butterfly 1: main patrol (figure-8 across the scene) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0.88;0.88;0" keyTimes="0;0.06;0.88;1" dur="15s" begin="1s" repeatCount="indefinite"/>
    <g><animateMotion dur="15s" begin="1s" repeatCount="indefinite" rotate="auto" path="M880 30 C700 60 560 5 420 40 C300 68 160 15 20 38 C160 62 340 20 520 50 C680 72 800 45 880 30"/>
    <g transform="scale(0.55)">
      <g><animateTransform attributeName="transform" type="scale" values="1 1;1 0.3;1 1" keyTimes="0;0.5;1" dur="0.4s" repeatCount="indefinite"/>
      <path d="M1 -1 C 7 -15, -13 -17, -6 -2 Z" fill="#FF9075" opacity="0.9"/>
      <path d="M-3 -1 C -7 -13, -17 -8, -9 -1 Z" fill="#FFD0BE" opacity="0.85"/>
      <path d="M1 1 C 7 15, -13 17, -6 2 Z" fill="#FF9075" opacity="0.9"/>
      <path d="M-3 1 C -7 13, -17 8, -9 1 Z" fill="#FFD0BE" opacity="0.85"/></g>
      <ellipse rx="5.5" ry="1.8" fill="#C9744F"/>
      <path d="M5 -1 Q 9 -5 11 -6 M5 1 Q 9 5 11 6" stroke="#C9744F" stroke-width="0.8" fill="none"/></g>
    </g>
  </g>

  <!-- butterfly 2: smaller, faster, different path -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0.7;0.7;0" keyTimes="0;0.08;0.85;1" dur="10s" begin="3.5s" repeatCount="indefinite"/>
    <g><animateMotion dur="10s" begin="3.5s" repeatCount="indefinite" rotate="auto" path="M30 50 C200 30 400 60 600 25 C750 0 820 45 870 30 C700 50 500 20 300 50 C150 70 80 40 30 50"/>
    <g transform="scale(0.4)">
      <g><animateTransform attributeName="transform" type="scale" values="1 1;1 0.3;1 1" keyTimes="0;0.5;1" dur="0.35s" repeatCount="indefinite"/>
      <path d="M1 -1 C 7 -15, -13 -17, -6 -2 Z" fill="#FFAC90" opacity="0.85"/>
      <path d="M-3 -1 C -7 -13, -17 -8, -9 -1 Z" fill="#FFD9A8" opacity="0.8"/>
      <path d="M1 1 C 7 15, -13 17, -6 2 Z" fill="#FFAC90" opacity="0.85"/>
      <path d="M-3 1 C -7 13, -17 8, -9 1 Z" fill="#FFD9A8" opacity="0.8"/></g>
      <ellipse rx="5" ry="1.5" fill="#C9744F"/>
      <path d="M4.5 -1 Q 8 -4.5 10 -5 M4.5 1 Q 8 4.5 10 5" stroke="#C9744F" stroke-width="0.7" fill="none"/></g>
    </g>
  </g>
</svg>
